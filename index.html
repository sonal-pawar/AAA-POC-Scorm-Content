<!DOCTYPE html>
<html>
<head>
    <title>Dynamic SCORM Template</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; }
        .grid-66-33 {
            display: grid;
            grid-template-columns: 2fr 1fr;
            height: 100vh;
            gap: 20px;
            padding: 20px;
        }
        .content { background: #f5f5f5; padding: 20px; overflow: auto; }
        .sidebar { background: #e9e9e9; padding: 20px; }
        .tab-nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; border: none; background: #007cba; color: white; cursor: pointer; }
        .tab-btn.active { background: #005a87; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <div class="grid-66-33">
        <div class="content">
            <nav class="tab-nav" data-slot="tab-headers"></nav>
            <div id="tab-contents" data-slot="tab-contents"></div>
        </div>
        <div class="sidebar" data-slot="media"></div>
    </div>

    <script>
        // SCORM API Wrapper
        const API = {
            LMSInitialize: () => { console.log('SCORM Initialize'); return true; },
            LMSFinish: () => { console.log('SCORM Finish'); return true; },
            LMSGetValue: (name) => { console.log('Get:', name); return ''; },
            LMSSetValue: (name, value) => { console.log('Set:', name, value); return true; },
            LMSCommit: () => { console.log('SCORM Commit'); return true; },
            LMSIsInitialized: () => true
        };
        window.API = API || parent.API || parent.parent.API;

        // Your GitHub Pages base URL
        const BASE_URL = "https://YOUR_USERNAME.github.io/scorm-assets/";

        async function loadDynamicContent() {
            try {
                // 1. Fetch your dynamic config
                const response = await fetch(`${BASE_URL}config.json`);
                const config = await response.json();
                
                // 2. Populate tabs
                const tabNav = document.querySelector('[data-slot="tab-headers"]');
                const tabContents = document.querySelector('[data-slot="tab-contents"]');
                const mediaSlot = document.querySelector('[data-slot="media"]');
                
                // Create tabs from JSON
                config.tabs.forEach((tab, index) => {
                    // Tab button
                    const tabBtn = document.createElement('button');
                    tabBtn.className = 'tab-btn';
                    tabBtn.textContent = tab.title;
                    tabBtn.onclick = () => switchTab(index);
                    tabNav.appendChild(tabBtn);
                    
                    // Tab content
                    const tabDiv = document.createElement('div');
                    tabDiv.className = 'tab-content';
                    tabDiv.id = `tab-${index}`;
                    tabDiv.innerHTML = tab.content;
                    tabContents.appendChild(tabDiv);
                });
                
                // 3. Load media
                mediaSlot.innerHTML = `<img src="${BASE_URL}${config.media}" style="width:100%; height:auto;">`;
                
                // 4. Activate first tab
                switchTab(0);
                
                // 5. SCORM tracking
                API.LMSSetValue("cmi.core.lesson_status", "completed");
                API.LMSCommit();
                
            } catch (error) {
                console.error('Failed to load dynamic content:', error);
            }
        }

        function switchTab(index) {
            // Update active tab UI
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
            document.querySelectorAll('.tab-content').forEach((content, i) => {
                content.classList.toggle('active', i === index);
            });
            
            // Track tab change in SCORM
            API.LMSSetValue("cmi.interactions." + index + ".type", "choice");
            API.LMSSetValue("cmi.interactions." + index + ".student_response", index);
            API.LMSCommit();
        }

        // Initialize when SCORM starts
        if (API.LMSInitialize("")) {
            loadDynamicContent();
        }
    </script>
</body>
</html>
